version: "2.4"

# =============================================================================
# DragonPing — HPC Deployment
# Single external port: 7190
# Usage:
#   docker-compose -f docker-compose.hpc.yml --env-file .env.hpc up -d --build
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL database — internal only, never exposed to host
  # ---------------------------------------------------------------------------
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: $POSTGRES_PASSWORD
      POSTGRES_DB:       dragonping_db
    volumes:
      - dragonping_hpc_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # FastAPI backend — internal only, accessed via nginx proxy
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    env_file:
      - .env.hpc
    depends_on:
      db:
        condition: service_healthy
    # Required for pythonping ICMP checks (NET_RAW socket)
    cap_add:
      - NET_ADMIN
      - NET_RAW

  # ---------------------------------------------------------------------------
  # Nginx — single entry point on port 7190
  # Builds React frontend, proxies /api/* to backend
  # Build context is project root so it can access nginx/ and frontend/
  # ---------------------------------------------------------------------------
  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    restart: always
    ports:
      - "7190:7190"
    depends_on:
      - backend

volumes:
  dragonping_hpc_data:
    driver: local
